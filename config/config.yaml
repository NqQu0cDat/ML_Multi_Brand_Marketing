# Configuration file for Multi-Brand Marketing ML Project

project_name: "Multi-Brand Marketing ML"

data:
  raw_path: "data/raw"
  processed_path: "data/processed"
  
model:
  type: "xgboost"  # Options: "xgboost", "lightgbm", "linear_regression", "random_forest"
  random_state: 42
  test_size: 0.2
  
hyperparameters:
  learning_rate: 0.1
  max_depth: 5
  n_estimators: 100
  
output:
  models_path: "models"
  results_path: "results"
  plots_path: "results/plots"
  metrics_path: "results/metrics"
